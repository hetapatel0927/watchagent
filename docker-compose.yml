services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - watchagent_data:/data
    environment:
      - DATABASE_PATH=/data/watchagent.db
      - POLL_INTERVAL_SECONDS=${POLL_INTERVAL_SECONDS:-900}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  watchagent_data:
    driver: local
